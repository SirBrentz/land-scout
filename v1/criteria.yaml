# Alert criteria for land-scout. Tune freely — no code changes needed.
# PROVISIONAL: county $/acre caps are placeholders until the Phase-1 market
# report lands; they will be replaced with researched benchmarks.

min_acres: 10          # smaller than this isn't huntable/campable
max_price: 250000      # hard ceiling regardless of acreage
max_miles: 45          # straight-line from Greenbrier

# Max $/acre to count as "fairly priced" per county (placeholder values).
# Listings above the cap still get tracked, they just score lower.
max_ppa_by_county:
  Faulkner: 8000
  Conway: 6000
  Van Buren: 5000
  Cleburne: 6000
  White: 6500
  Perry: 5500
  Pulaski: 9000
default_max_ppa: 7000

# Keywords in the title/types that add points
bonus_keywords:
  - creek
  - pond
  - lake
  - spring
  - timber
  - hunting
  - deer
  - utilities
  - well
  - septic
  - "road frontage"
  - pasture

# Keywords that subtract points (likely unusable or misleading tracts)
red_flag_keywords:
  - floodway
  - "flood zone"
  - landlocked
  - "no access"
  - easement only
  - commercial
  - "mobile home park"

# Score >= this triggers "top match" placement in the digest email
alert_score: 70
