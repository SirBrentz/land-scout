# Alert criteria for land-scout. Tune freely — no code changes needed.
# Benchmarks derived from research/2026-07-land-market-report.md:
# caps = each county's median $/acre for raw 15-40 acre tracts
# (3,003-listing scrape, 2026-07-05). Listings priced below the cap score
# higher the further below they sit.

min_acres: 10          # below 10ac you pay a 2-4x per-acre homesite premium
max_price: 250000      # covers 80ac Van Buren or ~20ac Faulkner
max_miles: 45          # straight-line from Greenbrier

max_ppa_by_county:
  Faulkner: 15000
  Conway: 7500
  "Van Buren": 5000
  Cleburne: 9000
  White: 11000
  Perry: 7000
  Pulaski: 20000
default_max_ppa: 9000

# Keywords in the title/types that add points (feature + financing drivers)
bonus_keywords:
  - creek
  - pond
  - lake
  - spring
  - timber
  - hunting
  - deer
  - utilities
  - well
  - septic
  - perc
  - "soil test"
  - "road frontage"
  - "deeded access"
  - "owner financing"
  - wma
  - "camp robinson"
  - pasture

# Verified deal-killers (see report sections 3-4)
red_flag_keywords:
  - floodway
  - "flood zone"
  - landlocked
  - "no access"
  - "no legal access"
  - "easement needed"
  - "easement only"
  - "mineral rights reserved"
  - "tax deed"
  - "quiet title"
  - commercial
  - "mobile home park"

# Score >= this triggers "top match" placement in the digest email
alert_score: 70
